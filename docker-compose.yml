version: '3.9'

services:

  # ── Nginx (Web Server + Reverse Proxy) ────────
  nginx:
    image: nginx:1.25-alpine
    container_name: cost-analysis-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ../cost-analysis-src/build:/usr/share/nginx/html:ro
    depends_on:
      - app
    networks:
      - cost-net
    restart: unless-stopped

  # ── Spring Boot WAS ──────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cost-analysis-app
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    env_file: .env
    environment:
      SPRING_PROFILES_ACTIVE: dev
    networks:
      - cost-net
    restart: unless-stopped

  # ── PostgreSQL ────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: cost-analysis-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: cost_analysis
      POSTGRES_USER: cost_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/main/resources/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./src/main/resources/data.sql:/docker-entrypoint-initdb.d/02-data.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cost_user -d cost_analysis"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cost-net
    restart: unless-stopped

  # ── Redis ─────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: cost-analysis-redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cost-net
    restart: unless-stopped

  # ── MinIO (Object Storage) ────────────────────
  minio:
    image: minio/minio:latest
    container_name: cost-analysis-minio
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web Console
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
    volumes:
      - minio_data:/data
    networks:
      - cost-net
    restart: unless-stopped

networks:
  cost-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
